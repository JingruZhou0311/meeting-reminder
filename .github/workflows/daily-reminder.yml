name: 会议每日提醒

on:
  schedule:
    # UTC 23:30 = 北京时间 07:30
    # 故意设在非整点、非UTC午夜，避开GitHub Actions全球高峰期
    # 脚本内部会等待到北京时间08:00再发送（waitUntilBeijing8AM）
    # 即使GitHub延迟触发，过了08:00也会直接发送
    - cron: '30 23 * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node send_reminder.js
